server:
  port: 8081

spring:
  application:
    name: Que-11

  datasource:
    url: jdbc:mariadb://localhost:3307/training
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect

